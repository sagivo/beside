<!doctype html>
<html style="background: #fafaf7;">
<head>
  <meta charset="utf-8" />
  <title>CofounderOS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <style>
    @media (prefers-color-scheme: dark) {
      html { background: #14110f !important; }
      .loading { color: #b8b1a6 !important; }
    }
  </style>
</head>
<body style="margin:0;">
  <div id="root">
    <div class="loading" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 24px; color: #8a857e; text-align: center; margin-top: 40vh; font-size: 14px;">
      Loading CofounderOS…
    </div>
  </div>
  <script>
    window.addEventListener('error', function (event) {
      var root = document.getElementById('root');
      if (!root) return;
      root.innerHTML = '<div style="font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;padding:24px;"><h1>Renderer error</h1><pre style="white-space:pre-wrap">' +
        String(event.error && event.error.stack ? event.error.stack : event.message) +
        '</pre></div>';
    });
    window.addEventListener('unhandledrejection', function (event) {
      var root = document.getElementById('root');
      if (!root) return;
      root.innerHTML = '<div style="font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;padding:24px;"><h1>Renderer promise error</h1><pre style="white-space:pre-wrap">' +
        String(event.reason && event.reason.stack ? event.reason.stack : event.reason) +
        '</pre></div>';
    });
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
