<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Beside</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" />
  <style>
    /* Cool paper / indigo-ink — mirrors the website palette so first
       paint matches the redesigned surfaces in style.css. */
    html, body { background: #f5f6fb; color: #15182a; margin: 0; }
    html.dark, html.dark body { background: #0d0f1c; color: #e6e8f4; }
    .boot {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 24px;
      color: #5a607d;
      text-align: center;
      margin-top: 40vh;
      font-size: 14px;
      letter-spacing: -0.01em;
    }
  </style>
  <script>
    (function () {
      try {
        var pref = localStorage.getItem('beside:theme');
        var resolved;
        if (pref === 'light' || pref === 'dark') {
          resolved = pref;
        } else {
          resolved = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
            ? 'dark'
            : 'light';
        }
        if (resolved === 'dark') document.documentElement.classList.add('dark');
      } catch (e) { /* ignore */ }
    })();
  </script>
</head>
<body>
  <div id="root">
    <div class="boot">Loading Beside…</div>
  </div>
  <script>
    function renderBootError(title, message) {
      var root = document.getElementById('root');
      if (!root) return;
      root.textContent = '';
      var wrapper = document.createElement('div');
      wrapper.style.fontFamily = 'Inter,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif';
      wrapper.style.padding = '24px';
      var heading = document.createElement('h1');
      heading.textContent = title;
      var pre = document.createElement('pre');
      pre.style.whiteSpace = 'pre-wrap';
      pre.textContent = String(message);
      wrapper.appendChild(heading);
      wrapper.appendChild(pre);
      root.appendChild(wrapper);
    }
    window.addEventListener('error', function (event) {
      renderBootError(
        'Renderer error',
        event.error && event.error.stack ? event.error.stack : event.message,
      );
    });
    window.addEventListener('unhandledrejection', function (event) {
      renderBootError(
        'Renderer promise error',
        event.reason && event.reason.stack ? event.reason.stack : event.reason,
      );
    });
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
