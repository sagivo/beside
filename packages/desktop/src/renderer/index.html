<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Beside</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" />
  <style>
    /* Cool paper / indigo-ink — mirrors the website palette so first
       paint matches the redesigned surfaces in style.css. */
    html, body { background: #f5f6fb; color: #15182a; margin: 0; }
    html.dark, html.dark body { background: #0d0f1c; color: #e6e8f4; }
    .boot {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 24px;
      color: #5a607d;
      text-align: center;
      margin-top: 40vh;
      font-size: 14px;
      letter-spacing: -0.01em;
    }
  </style>
  <script>
    (function () {
      try {
        var pref = localStorage.getItem('beside:theme');
        var resolved;
        if (pref === 'light' || pref === 'dark') {
          resolved = pref;
        } else {
          resolved = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
            ? 'dark'
            : 'light';
        }
        if (resolved === 'dark') document.documentElement.classList.add('dark');
      } catch (e) { /* ignore */ }
    })();
  </script>
</head>
<body>
  <div id="root">
    <div class="boot">Loading Beside…</div>
  </div>
  <script>
    window.addEventListener('error', function (event) {
      var root = document.getElementById('root');
      if (!root) return;
      root.innerHTML = '<div style="font-family:Inter,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;padding:24px;"><h1>Renderer error</h1><pre style="white-space:pre-wrap">' +
        String(event.error && event.error.stack ? event.error.stack : event.message) +
        '</pre></div>';
    });
    window.addEventListener('unhandledrejection', function (event) {
      var root = document.getElementById('root');
      if (!root) return;
      root.innerHTML = '<div style="font-family:Inter,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;padding:24px;"><h1>Renderer promise error</h1><pre style="white-space:pre-wrap">' +
        String(event.reason && event.reason.stack ? event.reason.stack : event.reason) +
        '</pre></div>';
    });
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
