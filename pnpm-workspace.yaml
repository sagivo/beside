packages:
  # Real workspace packages — interfaces, core, app. Everything else is
  # a drop-in plugin folder (packages/<layer>/<plugin>/ or
  # plugins/<layer>/<plugin>/) discovered at runtime via plugin.json,
  # compiled at build time by scripts/build-plugins.mjs. No package.json
  # needed in plugin folders.
  - "packages/interfaces"
  - "packages/core"
  - "packages/app"
