name: desktop-release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: publish (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            os: macos-14
            builder_args: --mac --arm64
            csc_link_secret: MACOS_CSC_LINK
            csc_password_secret: MACOS_CSC_KEY_PASSWORD
          - name: Windows x64
            os: windows-latest
            builder_args: --win --x64
            csc_link_secret: WINDOWS_CSC_LINK
            csc_password_secret: WINDOWS_CSC_KEY_PASSWORD
          - name: Linux x64
            os: ubuntu-latest
            builder_args: --linux --x64
            csc_link_secret: LINUX_CSC_LINK
            csc_password_secret: LINUX_CSC_KEY_PASSWORD

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_LINK: ${{ secrets[matrix.csc_link_secret] }}
      CSC_KEY_PASSWORD: ${{ secrets[matrix.csc_password_secret] }}
      HAS_APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_BASE64 != '' }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxss-dev libx11-dev libxext-dev libxtst-dev

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Configure Apple notarization API key
        if: runner.os == 'macOS' && env.HAS_APPLE_API_KEY == 'true'
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID_SECRET: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_SECRET: ${{ secrets.APPLE_API_ISSUER }}
          KEY_PATH: ${{ runner.temp }}/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8
        run: |
          python3 -c 'import base64, os; open(os.environ["KEY_PATH"], "wb").write(base64.b64decode(os.environ["APPLE_API_KEY_BASE64"]))'
          chmod 600 "$KEY_PATH"
          {
            echo "APPLE_API_KEY=$KEY_PATH"
            echo "APPLE_API_KEY_ID=$APPLE_API_KEY_ID_SECRET"
            echo "APPLE_API_ISSUER=$APPLE_API_ISSUER_SECRET"
          } >> "$GITHUB_ENV"

      - name: Validate macOS release secrets
        if: runner.os == 'macOS'
        run: |
          if [ -z "$CSC_LINK" ]; then
            echo "::error::MACOS_CSC_LINK is required for signed macOS releases."
            exit 1
          fi
          if [ -z "$CSC_KEY_PASSWORD" ]; then
            echo "::error::MACOS_CSC_KEY_PASSWORD is required for signed macOS releases."
            exit 1
          fi
          if [ -z "${APPLE_API_KEY:-}" ] || [ -z "${APPLE_API_KEY_ID:-}" ] || [ -z "${APPLE_API_ISSUER:-}" ]; then
            echo "::error::APPLE_API_KEY_BASE64, APPLE_API_KEY_ID, and APPLE_API_ISSUER are required for notarized macOS releases."
            exit 1
          fi

      - name: Warn when Windows signing is missing
        if: runner.os == 'Windows' && env.CSC_LINK == ''
        run: echo "::warning::No code-signing certificate configured for this OS. Add the documented secrets before shipping production builds."

      - name: Build and publish desktop app
        run: pnpm --filter @beside/desktop run dist -- ${{ matrix.builder_args }} --publish always

      - name: Verify macOS release signature
        if: runner.os == 'macOS'
        run: |
          dmg="$(ls packages/desktop/release/*.dmg)"
          xcrun stapler validate "$dmg"
          spctl -a -vvv -t open --context context:primary-signature "$dmg"

      - name: Upload release artifacts for inspection
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.name }}
          path: packages/desktop/release/**
          if-no-files-found: ignore
