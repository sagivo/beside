name: ci

on:
  push:
    branches: [main]
  pull_request:

# A single in-flight run per ref keeps the cross-OS matrix from
# stacking up on rapid pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # Linux runners need a few X11 dev headers for `active-win` and
      # `screenshot-desktop` to compile their native bits cleanly when
      # no prebuilt is available. Cheap to install; no-op on macOS/Win.
      - name: Install X11 deps (linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxss-dev libx11-dev libxext-dev libxtst-dev

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build (workspace + plugins)
        run: pnpm build

      # Cheap smoke: confirms the compiled CLI loads on this OS — i.e.
      # all workspace packages + their `dist/` exports resolve, native
      # addons opened by side-effect imports don't crash the process,
      # and the shebang/entry works under `node`.
      - name: Smoke - cli help
        run: node packages/app/dist/cli.js help

      - name: Smoke - cli doctor
        env:
          COFOUNDEROS_DATA_DIR: ${{ runner.temp }}/cofounderos-smoke
          NO_COLOR: '1'
        run: node packages/app/dist/cli.js doctor

      # Plugin discovery + per-layer instantiation. Constructors only —
      # nothing is started, so capture doesn't actually probe displays.
      # We point COFOUNDEROS_DATA_DIR at the runner workspace so the
      # SQLite db / index / export paths land in a sandbox we can blow
      # away with the runner, and we set NO_COLOR so the captured logs
      # don't include ANSI escapes.
      - name: Smoke - cli plugin list
        env:
          COFOUNDEROS_DATA_DIR: ${{ runner.temp }}/cofounderos-smoke
          NO_COLOR: '1'
        run: node packages/app/dist/cli.js plugin list

      # Status exercises every plugin's getStatus / getStats. The
      # capture plugin's getStatus is pure (memory + counters; no
      # display probing — that's deferred to start()), so this is safe
      # on all three runners. If a regression makes the orchestrator
      # touch displays at construction time, this smoke will catch it.
      - name: Smoke - cli status
        env:
          COFOUNDEROS_DATA_DIR: ${{ runner.temp }}/cofounderos-smoke
          NO_COLOR: '1'
        run: node packages/app/dist/cli.js status

      # Fixture capture exercises the same storage + image encoding +
      # event write path as `capture --once`, but swaps desktop APIs for
      # deterministic in-process fakes so it is safe on headless Linux,
      # macOS runners without Screen Recording, and hosted Windows.
      - name: Smoke - capture once (fixture)
        env:
          COFOUNDEROS_CAPTURE_FIXTURE: '1'
          COFOUNDEROS_DATA_DIR: ${{ runner.temp }}/cofounderos-capture
          NO_COLOR: '1'
        run: node packages/app/dist/cli.js capture --once
